<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Real-Time Weather</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }

        body {
            background: #222;
            background: linear-gradient(135deg, #00feba, #5b548a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #fff;
            padding: 40px 35px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .search {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .search input {
            border: 0;
            outline: 0;
            background: #ebfffc;
            color: #555;
            padding: 10px 25px;
            height: 50px;
            border-radius: 30px;
            flex: 1;
            margin-right: 16px;
            font-size: 18px;
        }

        .search button {
            border: 0;
            outline: 0;
            background: #ebfffc;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search button:hover {
            background: #d1f7f1;
        }

        .search button img {
            width: 20px;
        }

        .weather-icon {
            width: 140px;
            margin-top: 30px;
        }

        .temp {
            font-size: 70px;
            font-weight: 500;
        }

        .city {
            font-size: 40px;
            font-weight: 400;
            margin-top: -10px;
        }

        .details {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            margin-top: 50px;
        }

        .col {
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .col p {
            font-size: 22px;
        }

        .label {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button id="search-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/482/482631.png" alt="search">
            </button>
        </div>
        
        <div class="weather">
            <img src="https://openweathermap.org/img/wn/10d@2x.png" class="weather-icon">
            <h1 class="temp">--°C</h1>
            <h2 class="city">Search a City</h2>
            
            <div class="details">
                <div class="col">
                    <p class="humidity">--%</p>
                    <p class="label">Humidity</p>
                </div>
                <div class="col">
                    <p class="wind">-- km/h</p>
                    <p class="label">Wind Speed</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "8a3b...your_actual_key_here...";
        const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        const searchBox = document.querySelector(".search input");
        const searchBtn = document.getElementById("search-btn");
        const weatherIcon = document.querySelector(".weather-icon");

        async function checkWeather(city) {
            if (!city) return;

            try {
                const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
                
                if (response.status == 404) {
                    alert("City not found. Please try again.");
                } else {
                    const data = await response.json();

                    document.querySelector(".city").innerHTML = data.name;
                    document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
                    document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
                    document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";

                    // Update weather icon dynamically from API
                    const iconCode = data.weather[0].icon;
                    weatherIcon.src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
                }
            } catch (error) {
                console.error("Error fetching weather data:", error);
                alert("An error occurred. Check your API key or connection.");
            }
        }

        searchBtn.addEventListener("click", () => {
            checkWeather(searchBox.value);
        });

        // Allow pressing "Enter" key to search
        searchBox.addEventListener("keypress", (event) => {
            if (event.key === "Enter") {
                checkWeather(searchBox.value);
            }
        });
    </script>
</body>
</html>
